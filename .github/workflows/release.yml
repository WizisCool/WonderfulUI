name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# Tag builds cannot *create* caches that later tags reliably reuse (GHA caches
# are branch-scoped; only the default branch is a shared source). The
# cache-warm workflow on main populates the same rust-cache / bun keys so
# release jobs restore a warm target/. See docs/AGENT_WORKFLOW.md.
#
# Timing (v0.1.8 warm Windows runner, ~13 min sequential):
#   setup/caches ~2 min | cargo test debug ~2.5 min | tauri build ~8 min
# validate + build run in parallel so wall clock ≈ max(test, build) + publish.

env:
  CARGO_TERM_COLOR: always
  # With restored dep artifacts, non-incremental builds avoid writing huge
  # incremental graphs that bloat the Windows cache for little gain.
  CARGO_INCREMENTAL: "0"

jobs:
  # ── quality gate (debug cargo + JS) — overlaps with release build ──────────
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # Debug profile cache key is separate from release (wui-release).
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: wui-debug-lib
          cache-all-crates: true
          cache-on-failure: true

      - run: bun install --frozen-lockfile
      - run: bun run scripts/check-versions.ts
      - run: bun run typecheck
      - run: bun run test

      # Debug-profile unit tests only — never release-profile, so we do not
      # recompile what the parallel build job already compiles as release.
      - name: Cargo lib tests (debug)
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

  # ── signed NSIS bundle (long pole) ─────────────────────────────────────────
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # Restore release-profile deps warmed on main (see cache-warm.yml).
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: wui-release
          cache-all-crates: true
          cache-on-failure: true

      - run: bun install --frozen-lockfile

      # tauri build reads TAURI_SIGNING_PRIVATE_KEY / _PASSWORD from env
      # and, when bundle.createUpdaterArtifacts=true, writes a minisign
      # .sig next to the NSIS setup.exe (v2 updater format). The private
      # key itself never enters the workflow file -- it lives only in
      # repo secrets. See docs/UPDATER.md for the key-management contract.
      - name: Build Tauri app (signing keys from secrets)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wonderful-ui-${{ github.ref_name }}
          path: target/release/bundle/
          if-no-files-found: error
          retention-days: 14

  # ── GitHub Release + latest.json (only after both jobs succeed) ────────────
  publish:
    needs: [validate, build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          # Shallow is enough when versions.json has notes; still fetch tags
          # for the git-log fallback when notes are empty.
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: wonderful-ui-${{ github.ref_name }}
          path: target/release/bundle

      # Generate latest.json for tauri-plugin-updater. Schema and field
      # semantics live in docs/UPDATER.md. We assume the v2 NSIS product
      # layout is <productName>_<version>_x64-setup.exe(.sig).
      - name: Generate latest.json
        shell: pwsh
        run: |
          $nsisDir = "target/release/bundle/nsis"
          $setupExe = Get-ChildItem -Path $nsisDir -Filter "*-setup.exe" | Select-Object -First 1
          $setupSig = Get-ChildItem -Path $nsisDir -Filter "*-setup.exe.sig" | Select-Object -First 1
          if (-not $setupExe) { Write-Error "No setup.exe found in $nsisDir"; exit 1 }
          if (-not $setupSig) { Write-Error "No setup.exe.sig found in $nsisDir"; exit 1 }

          $tauriConf = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $version = $tauriConf.version
          $tag = "v$version"
          $expectedPrefix = "$($tauriConf.productName)_${version}_x64-setup"
          if ($setupExe.Name -notlike "${expectedPrefix}*") {
            Write-Warning "Setup filename '$($setupExe.Name)' doesn't match expected '$expectedPrefix*'. NOTES 产物文件名需实测核对 -- verify latest.json's url field."
          }

          $signature = (Get-Content -Path $setupSig.FullName -Raw).Trim()

          # Release notes priority:
          # 1) versions.json releases.<tag>.notes
          # 2) git log subject lines since previous tag
          # 3) generic one-liner
          $notes = $null
          if (Test-Path "versions.json") {
            $versions = Get-Content "versions.json" -Raw | ConvertFrom-Json
            $entry = $versions.releases."$tag"
            if ($entry) { $notes = $entry.notes }
          }
          if ([string]::IsNullOrWhiteSpace($notes)) {
            $prevTag = git describe --tags --abbrev=0 "$tag^" 2>$null
            if ($LASTEXITCODE -eq 0 -and $prevTag) {
              $log = git log --pretty=format:"- %s" "$prevTag..$tag" 2>$null
              if ($LASTEXITCODE -eq 0 -and -not [string]::IsNullOrWhiteSpace($log)) {
                $notes = ($log -join "`n").Trim()
                Write-Host "notes: fell back to git log $prevTag..$tag"
              }
            }
          }
          if ([string]::IsNullOrWhiteSpace($notes)) {
            $notes = "WonderfulUI $tag"
            Write-Warning "versions.json notes empty and git log fallback failed; using generic title."
          }

          $url = "https://github.com/${{ github.repository }}/releases/download/$tag/$($setupExe.Name)"
          $pubDate = [DateTime]::UtcNow.ToString("yyyy-MM-ddTHH:mm:ssZ")

          $latest = [ordered]@{
            version  = $version
            notes    = $notes
            pub_date = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url       = $url
              }
            }
          }
          $json = $latest | ConvertTo-Json -Depth 6
          Set-Content -Path "latest.json" -Value $json -Encoding utf8 -NoNewline
          Write-Host "Wrote latest.json:"
          Get-Content latest.json

          $parsed = $json | ConvertFrom-Json
          if (-not $parsed.version) { Write-Error "latest.json missing version"; exit 1 }
          if (-not $parsed.platforms.'windows-x86_64'.url) { Write-Error "latest.json missing platform url"; exit 1 }
          if (-not $parsed.platforms.'windows-x86_64'.signature) { Write-Error "latest.json missing platform signature"; exit 1 }
          if ($parsed.version -ne $version) { Write-Error "latest.json version mismatch"; exit 1 }

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.exe.sig
            latest.json
