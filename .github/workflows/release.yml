name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cache cargo registry + target. Key on Cargo.lock hash so a dep
      # bump invalidates cleanly. Tauri pulls ~600 crates (libsqlite3-sys,
      # webview2-com, tauri-codegen) and the release profile uses LTO;
      # without this cache, every tag build re-codes from scratch.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ${{ runner.os }}-release

      - run: bun install --frozen-lockfile
      - run: bun run scripts/check-versions.ts
      - run: bun run typecheck
      - run: bun run test
      - run: cargo test --release --manifest-path src-tauri/Cargo.toml --lib
      - run: bun run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wonderful-ui-${{ github.ref_name }}
          path: target/release/bundle/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: false
          generate_release_notes: true
          files: |
            target/release/bundle/nsis/*.exe
